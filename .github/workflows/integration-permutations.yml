# Integration tests for all 4 permutations of allowDeltaDeploys × allowDestructiveChanges.
#
# Permutations:
#   1. delta=true,  destructive=false  — delta package only, skip destructive cleanup
#   2. delta=true,  destructive=true   — delta package + destructive changes file
#   3. delta=false, destructive=false  — full branch deploy, skip destructive cleanup
#   4. delta=false, destructive=true   — full branch deploy + destructive changes file
#
# All 4 permutations run on every trigger. Delta mode resolves its "from" ref via
# github.base_ref (PR), github.event.before (push), or HEAD^ (dispatch/merge_group).
name: Integration (permutations)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:
  schedule:
    # Mondays 03:00 UTC — re-validate the pinned toolchain weekly so the public
    # "Pinned toolchain" compatibility badge stays fresh even when main is quiet.
    # Staggered an hour before the compat probe (04:00) to avoid concurrent org load.
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  # All four permutation jobs skip Dependabot-triggered runs: Dependabot PRs
  # read from the Dependabot secrets store, where SFDX_AUTH_URL is (by
  # design) not defined, so org validation cannot run — and a dependency
  # bump cannot change CairnCI's against-org behavior anyway. Skipped jobs
  # still satisfy required status checks.
  # --- Permutation 1: delta, no destructive ---
  perm-delta-no-destructive:
    name: "delta=true destructive=false"
    if: github.repository == 'Fossiltalk/CairnCI-Internal' && github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/sf-validate.yml
    with:
      environment: main
      source-dir: tests/fixtures/force-app
      delta: ${{ 'true' }}
      allow-destructive-changes: ${{ 'false' }}
      test-level: RunLocalTests
      min-coverage: "75"
    secrets: inherit

  # --- Permutation 2: delta + destructive ---
  perm-delta-destructive:
    name: "delta=true destructive=true"
    if: github.repository == 'Fossiltalk/CairnCI-Internal' && github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/sf-validate.yml
    with:
      environment: main
      source-dir: tests/fixtures/force-app
      delta: ${{ 'true' }}
      allow-destructive-changes: ${{ 'true' }}
      test-level: RunLocalTests
      min-coverage: "75"
    secrets: inherit

  # --- Permutation 3: full-branch, no destructive ---
  # test-level is RunSpecifiedTests here (not RunLocalTests, unlike the delta permutations
  # above): full-branch mode deploys the entire fixture, which includes Apex
  # (CairnCiSmoke*.cls). The moment any Apex is in the payload, RunLocalTests makes Salesforce
  # check org-wide coverage across *everything already live in CairnCI-Main* (a real,
  # richly-populated dogfood org) plus every trigger's individual coverage org-wide — so that
  # gate was failing on the target org's pre-existing content, not anything about the pipeline
  # mechanics this permutation exists to test (confirmed: ProcessIAForBenefitAssistance, a
  # real Public Sector trigger unrelated to this fixture, tripped "0% coverage, >=1% required").
  # RunSpecifiedTests scopes coverage to just the specified test's own targets instead of the
  # whole org (verified directly against CairnCI-Main: 100% coverage, validation succeeds).
  # The delta permutations don't need this since their computed delta for these
  # fixture-untouched commits contains no Apex, so coverage checking never engages there.
  perm-full-no-destructive:
    name: "delta=false destructive=false"
    if: github.repository == 'Fossiltalk/CairnCI-Internal' && github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/sf-validate.yml
    with:
      environment: main
      source-dir: tests/fixtures/force-app
      delta: ${{ 'false' }}
      allow-destructive-changes: ${{ 'false' }}
      test-level: RunSpecifiedTests
      tests: CairnCiSmokeTest
      min-coverage: "75"
    secrets: inherit

  # --- Permutation 4: full-branch + destructive ---
  # test-level: RunSpecifiedTests — see permutation 3's comment above; same reasoning applies.
  perm-full-destructive:
    name: "delta=false destructive=true"
    if: github.repository == 'Fossiltalk/CairnCI-Internal' && github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/sf-validate.yml
    with:
      environment: main
      source-dir: tests/fixtures/force-app
      delta: ${{ 'false' }}
      allow-destructive-changes: ${{ 'true' }}
      test-level: RunSpecifiedTests
      tests: CairnCiSmokeTest
      min-coverage: "75"
    secrets: inherit
