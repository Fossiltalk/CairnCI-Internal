# Integration tests for the omnistudio-standard-runtime-cache-refresh
# extension. Unit + CLI tests are org-free and browser-free (the org and the
# headless browser are stubbed), so no org secret is needed here. Real-org
# activation behavior is exercised separately via workflow_dispatch against a
# Standard Runtime org before a release. Mirrors
# integration-permset-access-gate.yml, plus a dist-freshness check because
# this extension — unlike its dependency-free siblings — ships a bundled
# puppeteer-core dependency (see the action's README).
name: omnistudio-standard-runtime-cache-refresh Tests

on:
  pull_request:
    paths:
      - .github/actions/omnistudio-standard-runtime-cache-refresh/**
      - .github/workflows/integration-omnistudio-standard-runtime-cache-refresh.yml
  push:
    branches: [main, CairnCI-External]
    paths:
      - .github/actions/omnistudio-standard-runtime-cache-refresh/**
      - .github/workflows/integration-omnistudio-standard-runtime-cache-refresh.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    if: github.repository == 'Fossiltalk/CairnCI-Internal'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run unit + CLI tests
        shell: bash
        # Explicit glob: Node >= 23 treats a bare directory arg as a module
        # path, so the glob form works on every Node line.
        run: node --test .github/actions/omnistudio-standard-runtime-cache-refresh/tests/*.test.mjs

      # The action runs from the checked-in dist/ bundle (no npm install at
      # run time), so a source edit without a rebuild would silently ship the
      # old code. Rebuild and require a clean diff.
      - name: Check dist/ bundle is up to date
        shell: bash
        working-directory: .github/actions/omnistudio-standard-runtime-cache-refresh
        run: |
          set -euo pipefail
          npm ci
          npm run build
          if ! git diff --exit-code -- dist; then
            echo "::error::dist/ is stale — run 'npm run build' in .github/actions/omnistudio-standard-runtime-cache-refresh and commit the result."
            exit 1
          fi

      # Smoke the bundled CLI the way the composite action runs it: no
      # manifest -> notice + exit 0, and a warn scenario -> exit 10 with one
      # ::warning, using a stub sf CLI (no org, no browser).
      - name: Smoke the bundled CLI
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE="$PWD/.github/actions/omnistudio-standard-runtime-cache-refresh/dist/index.mjs"
          WORK="$(mktemp -d)"
          cd "$WORK"

          echo "-- no manifest: expect exit 0"
          node "$BUNDLE"

          mkdir -p changed-sources/package
          cat > changed-sources/package/package.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <Package xmlns="http://soap.sforce.com/2006/04/metadata">
            <types>
              <members>Demo_DataRaptor_1</members>
              <name>OmniDataTransform</name>
            </types>
            <version>62.0</version>
          </Package>
          XML
          cat > sf-stub <<'STUB'
          #!/usr/bin/env node
          const args = process.argv.slice(2).join(" ");
          if (args.startsWith("data query")) {
            console.log(JSON.stringify({ status: 0, result: { records: [
              { Id: "0jD1", UniqueName: "Demo_DataRaptor_1", IsActive: false, VersionNumber: 1 }
            ] } }));
          } else {
            console.log(JSON.stringify({ status: 1, message: "unexpected: " + args }));
          }
          STUB
          chmod +x sf-stub

          echo "-- inactive DataRaptor: expect exit 10 with one ::warning"
          set +e
          OMNI_CACHE_REFRESH_SF_BIN="$PWD/sf-stub" node "$BUNDLE" | tee out.log
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -ne 10 ]; then
            echo "::error::expected exit 10 from the warn scenario, got $code"
            exit 1
          fi
          if [ "$(grep -c '^::warning::' out.log)" -ne 1 ]; then
            echo "::error::expected exactly one ::warning line"
            exit 1
          fi
