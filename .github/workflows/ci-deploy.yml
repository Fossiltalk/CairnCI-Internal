# Dogfood caller: deploy this repo's own metadata on merge to a deployable branch.
# Reference example for consumers (see examples/caller-deploy.yml).
name: CI Deploy

on:
  push:
    branches: [main]
    paths:
      - "force-app/**"

# ci-deploy dogfoods sf-deploy.yml, which can push a revert / open a PR when
# rollback-strategy is enabled. A caller's permissions cap the reusable
# workflow's token, so grant what sf-deploy needs — else rollback silently
# can't run. See docs/consumer-setup.md section 5a.
permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    uses: ./.github/workflows/sf-deploy.yml
    with:
      environment: ${{ github.ref_name }}
      source-dir: force-app
      test-level: RunLocalTests
    secrets: inherit
