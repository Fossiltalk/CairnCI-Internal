<!DOCTYPE html>
<html>

    <head>
        <meta http-equiv="X-UA-Compatible"
              content="IE=edge" />
        <meta http-equiv="Content-Type"
              content="text/html;charset=utf-8">
        <style>
            html,
            body {
                overflow: hidden;
                padding: 0;
                margin: 0;
                border: 0;
                background: transparent;
            }

            textarea {
                visibility: hidden;
            }
        </style>
        <script src="tinymce.min.js"></script>
    </head>

    <body>

        <textarea id="mytextarea"></textarea>


        <script>
            let _initialized;
            let _config;
            let _rteId;
            const staticStylesFormat = [
                {
                    title: "Headings", items: [
                        {title: "Heading 1", format: "h1"},
                        {title: "Heading 2", format: "h2"},
                        {title: "Heading 3", format: "h3"},
                        {title: "Heading 4", format: "h4"},
                        {title: "Heading 5", format: "h5"},
                        {title: "Heading 6", format: "h6"}
                    ]
                },
                {
                    title: "Blocks", items: [
                        {title: "Paragraph", block: "p"},
                        {title: "Div", block: "div"},
                        {title: "Pre", block: "pre"},
                        {title: "Blockquote", block: "blockquote"}
                    ]
                }
            ];

            window.addEventListener("message", receiveMessage, false);

            function receiveMessage() {
                switch (event.data.message) {
                    case "render":
                        _rteId = event.data.elementid;
                        renderEditor(event.data.value, event.data.config);
                        return;
                    case "value-changed":
                        updateValue(event.data.value);
                        return;
                    case "append-changed":
                        appendValue(event.data.value);
                        return;
                    case "config-changed":
                        updateEditor(event.data.value, event.data.config);
                        return;
                    case "set-mode":
                        tinymce.activeEditor.mode.set(event.data.value);
                        return;
                }
            }


            function renderEditor(value, config) {
                config = setConfigDefaults(config);
                document.getElementById("mytextarea").value = value;
                if (_initialized) {
                    tinymce.remove("#mytextarea");
                }
                tinymce.init(config);
            }

            function setConfigDefaults(config) {
                config['selector'] = "#mytextarea";
                config['height'] = config['height'] || 300;
                config['init_instance_callback'] = function (editor) {
                    editor.on('Change undo redo', function (e) {
                        window.parent.postMessage({
                            message: _rteId + "-change",
                            value: editor.getContent()
                        }, "*");
                    });
                }
                config['setup'] = function (editor) {
                    function changeBlockType(format) {
                        editor.execCommand('FormatBlock', false, format);
                    }
                    editor.on('init', function (e) {
                        _initialized = true;
                        window.parent.postMessage({
                            message: _rteId + "-initialized",
                            value: editor.getContent()
                        }, "*");
                    });

                    if (config.setupConfig && config.setupConfig.length > 0) {
                        config.setupConfig.forEach(config => {
                            if (config.type === "addMenuButton") {
                                if (config.menufn === "insertHtml") {
                                    if (config.items && config.items.length > 0) {
                                        if(config.name === "customstyles") {
                                            editor.ui.registry.addMenuButton('customstyles', {
                                                text: 'Block Type',
                                                fetch(callback) {
                                                    const items = staticStylesFormat.map(styleFormat => {
                                                        return {
                                                            type: 'nestedmenuitem',
                                                            text: styleFormat.title,
                                                            getSubmenuItems: () => styleFormat.items.map(item => {
                                                                const it = {
                                                                    type: 'menuitem',
                                                                    text: item.title,
                                                                    onAction() {
                                                                        changeBlockType(item.format ? item.format : item.block, item.title);
                                                                    }
                                                                };
                                                                const format = (item.format ? item.format : item.block).toLowerCase();
                                                                const selectedBlock = editor.selection.getSelectedBlocks()[0].localName.toLowerCase();
                                                                if (format === selectedBlock) {
                                                                    it.icon = "checkmark";
                                                                }
                                                                return it;
                                                            })
                                                        };
                                                    });
                                                    callback(items);
                                                },
                                                onSetup(api) {
                                                    function updateLabel() {
                                                        const selectedBlock = editor.selection.getSelectedBlocks()[0];
                                                        let label = 'Block Type';
                                                        if (selectedBlock) {
                                                            const tag = selectedBlock.localName.toLowerCase();
                                                            // Map tag to label
                                                            const allItems = staticStylesFormat.flatMap(group => group.items);
                                                            const found = allItems.find(item => {
                                                                const format = (item.format ? item.format : item.block).toLowerCase();
                                                                return format === tag;
                                                            });
                                                            if (found) {
                                                                label = found.title;
                                                            }
                                                        }
                                                        api.setText(label);
                                                    }
                                                    editor.on('NodeChange', updateLabel);
                                                    // Set initial label
                                                    updateLabel();
                                                    return function cleanup() {
                                                        editor.off('NodeChange', updateLabel);
                                                    };
                                                }
                                            });
                                        }
                                        else {
                                            editor.ui.registry.addMenuButton(config.name, {
                                                text: config.text,
                                                fetch: function (callback) {
                                                    let items = [];
                                                    config.items.forEach(item => {
                                                        items.push({
                                                            type: item.type,
                                                            text: item.text,
                                                            onAction: function () {
                                                                editor.insertContent(item.html);
                                                            }
                                                        })
                                                    });
                                                    callback(items);
                                                }
                                            });
                                        }
                                    }
                                } else if(config.menufn === "classtoggle") {
                                    editor.ui.registry.addMenuButton(config.name, {
                                        text: config.text,
                                        fetch: function (callback) {
                                          let items = [];
                                          config.items.forEach(mainItem => {
                                            let item = {
                                               type: mainItem.type,
                                               text: mainItem.text,
                                               getSubmenuItems: function () {
                                                let submenuItems = [];
                                                 let classes = mainItem.subitems.map(s => s.class);
                                                 mainItem.subitems.forEach(sbItem => {
                                                    let submenu = {
                                                      type: sbItem.type,
                                                      text: sbItem.text,
                                                      onAction: function (e) {
                                                        let group = classes;
                                                        let node = tinymce.activeEditor.selection.getNode();
                                                        if(node) {
                                                            let classList = node.classList;
                                                            let hasClass = classList.contains(sbItem.class);
                                                            if(!hasClass) {
                                                                classList.remove(...group);
                                                                classList.add(sbItem.class);
                                                            } else {
                                                                classList.remove(sbItem.class);
                                                            }
                                                            tinyMCE.activeEditor.fire("change",{});
                                                        }
                                                      },
                                                      onSetup: function (api) {
                                                        let node = tinymce.activeEditor.selection.getNode();
                                                        if(node) {
                                                            let classList = node.classList;
                                                            let hasClass =  classList.contains(sbItem.class);
                                                            api.setActive(hasClass);
                                                        }
                                                      }
                                                    }
                                                    submenuItems.push(submenu);
                                                 });
                                                return submenuItems;
                                               }
                                            }
                                            items.push(item);
                                          });
                                          callback(items);
                                        }
                                    });
                                }
                            }
                        });
                    }

                }
                return config;
            }

            function updateValue(value) {
                tinymce.activeEditor.setContent(value);
            }

            function appendValue(value) {
                tinymce.activeEditor.setContent(tinymce.activeEditor.getContent() + value);
            }
        </script>
    </body>

</html>
